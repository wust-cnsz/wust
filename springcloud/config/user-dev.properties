server:
  port: 8802 #服务端口
spring:
  application:
    name: user-server #指定服务名
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    password: ifurniture@123

  session:
    store-type: none
  datasource:
      url: jdbc:mysql://localhost:3306/springcloud?useUnicode=true&characterEncoding=utf-8&useSSL=false
      username: root
      password: root
      driver-class-name: com.mysql.jdbc.Driver
eureka:
  client:
    registerWithEureka: true #是否将自己注册到Eureka服务中，默认为true
    fetchRegistry: true #是否从Eureka中获取注册信息，默认为true
    serviceUrl: #Eureka客户端与Eureka服务端进行交互的地址
      defaultZone: http://127.0.0.1:8761/eureka/
  instance:
    hostname: 127.0.0.1        # 指定该实例的主机名
    prefer-ip-address: true #将自己的ip地址注册到Eureka服务中
    instance-id: 127.0.0.1:${server.port}
    status-page-url: http://127.0.0.1:${server.port}/swagger-ui.html # ${server.port}为该服务的端口号
#公共配置与profiles选择无关
mybatis:
  type-aliases-package: cc.ifurniture.user.entity
  mapper-locations: classpath:mapping/*.xml
#pagehelper分页插件
pagehelper:
    helperDialect: mysql
    reasonable: true
    supportMethodsArguments: true
    params: count=countSql
#logging:
#  config: classpath:log4j2.xml              #指定log4j2配置文件路径
